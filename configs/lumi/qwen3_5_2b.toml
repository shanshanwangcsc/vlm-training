[model]
model_name = "Qwen/Qwen3.5-2B"

model_impl = "native"

train_llm = true
train_mlp = true
train_vit = false

[wandb]
run_name = "qwen3-5_2b_lumi"
project_name = "qwen3-5_2b"
entity_name = "shanshan-wang-csc-csc"

[training]
